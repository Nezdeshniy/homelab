name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2404 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -p 2404 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd /opt/homelab/uptime-kuma &&
            docker compose pull &&
            docker compose up -d &&
            cd /opt/homelab/nginx &&
            docker compose pull &&
            docker compose up -d
          "